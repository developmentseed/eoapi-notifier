name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  versions:
    name: Check Aligned Versions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Verify Python and Helm chart versions match
        run: |
          PY_VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          CHART_VERSION=$(grep '^version:' helm-chart/eoapi-notifier/Chart.yaml | awk '{print $2}')
          APP_VERSION=$(grep '^appVersion:' helm-chart/eoapi-notifier/Chart.yaml | sed 's/appVersion: "\?\([^"]*\)"\?/\1/')

          echo "Python package version: ${PY_VERSION}"
          echo "Helm chart version: ${CHART_VERSION}"
          echo "Helm appVersion: ${APP_VERSION}"

          if [ "${PY_VERSION}" != "${CHART_VERSION}" ] || [ "${PY_VERSION}" != "${APP_VERSION}" ]; then
            echo "Version mismatch: pyproject.toml, Chart.yaml version, and appVersion must stay aligned."
            exit 1
          fi

  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: versions
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Cache pre-commit
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install dependencies
        run: uv sync --frozen --extra dev --extra test

      - name: Run code quality checks
        run: |
          echo "🔍 Running all code quality checks..."
          uv run pre-commit run --all-files --show-diff-on-failure

  test:
    name: Test Python 3.12
    runs-on: ubuntu-latest
    needs: [versions, quality]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --extra dev --extra test

      - name: Run tests with coverage
        run: |
          echo "🧪 Running tests for Python 3.12..."
          uv run pytest -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  build:
    name: Build & Verify Package
    runs-on: ubuntu-latest
    needs: [versions, quality, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Create virtual environment
        run: uv venv

      - name: Build package
        run: |
          echo "📦 Building Python package..."
          uv build

      - name: Verify package installation
        run: |
          echo "✅ Verifying package can be installed..."
          uv pip install dist/*.whl
          uv run python -c "import eoapi_notifier; print('Package installed successfully')"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
